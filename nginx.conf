events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;

    server {
        listen 80;
        server_name localhost;

        # Заголовок в ответах Nginx
        add_header ngrok-skip-browser-warning "true" always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Передаём заголовок дальше в backend
        proxy_set_header ngrok-skip-browser-warning "true";

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        location /api/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /media/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location ~ ^/(health|time-sync|roles|auth|users|devices|notifications|news|schedule|journal|requests|attendance|grades|grading-presets|analytics|teacher-assignments|departments|department-groups|curator-groups|exams|db|makeups)(/|$) {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}